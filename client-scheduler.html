<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Session Book</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="client-scheduler.css">
</head>
<body>

<div class="header">
  <div>
    <div class="brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>
      </div>
      <h1>Session Book</h1>
    </div>
    <div class="header-sub">Manage your clients and their schedules</div>
  </div>
  <div class="stat-group">
    <div class="stat-block">
      <div class="stat-num" id="statClients">0</div>
      <div class="stat-label">Total clients</div>
    </div>
    <div class="stat-block">
      <div class="stat-num" id="statSessions">0</div>
      <div class="stat-label">Sessions on the books</div>
    </div>
    <button class="icon-btn signout-btn" id="profileBtn" title="Your profile" aria-label="Your profile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
    <button class="icon-btn signout-btn" id="signOutBtn" title="Sign out" aria-label="Sign out">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tabClients">Clients</button>
  <button class="tab-btn" id="tabSchedule">Schedule</button>
  <button class="tab-btn" id="tabCalendar">Calendar</button>
  <button class="tab-btn" id="tabHistory">History</button>
</div>

<div class="toolbar" id="clientsToolbar">
  <input class="search-input" type="text" id="searchInput" placeholder="Search clients…" />
  <button class="btn-primary" id="openAddBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    Add client
  </button>
</div>
<div class="sync-row" id="syncBadge">Not connected · saving on this device only</div>

<div class="grid" id="grid"></div>
<div class="empty-state" id="emptyState" style="display:none;"></div>

<div class="schedule-view" id="scheduleView" style="display:none;"></div>

<div class="schedule-view" id="calendarView" style="display:none;"></div>

<div class="schedule-view" id="historyView" style="display:none;"></div>

<div class="overlay hidden" id="overlay">
  <div>
    <form class="add-form" id="addForm">
      <div class="add-form-header">
        <h2>New client</h2>
        <button type="button" class="icon-btn" id="closeAddBtn" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <label class="field">
        <span>Name</span>
        <input type="text" id="newName" placeholder="Full name" required />
      </label>
      <label class="field">
        <span>Email</span>
        <input type="email" id="newEmail" placeholder="client@example.com" required />
      </label>
      <label class="field">
        <span>Mobile number</span>
        <input type="tel" id="newPhone" placeholder="082 123 4567" required />
      </label>
      <label class="field">
        <span>Starting sessions</span>
        <input type="number" id="newSessions" min="0" value="10" required />
      </label>
      <p style="margin:0; font-size:11.5px; color:#6d7482; line-height:1.4;">
        This client gets an automatic confirmation email each time you
        schedule a session for them.
      </p>
      <button type="submit" class="btn-primary btn-full">Add client</button>
    </form>
  </div>
</div>

<div class="overlay hidden" id="profileOverlay">
  <div>
    <form class="add-form" id="profileForm">
      <div class="add-form-header">
        <h2>Your profile</h2>
        <button type="button" class="icon-btn" id="closeProfileBtn" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <label class="field">
        <span>Email</span>
        <input type="email" id="profileEmail" disabled />
      </label>
      <label class="field">
        <span>Company name</span>
        <input type="text" id="profileCompanyName" placeholder="Your business name" required />
      </label>
      <label class="field">
        <span>Mobile number</span>
        <input type="tel" id="profilePhone" placeholder="082 123 4567" required />
      </label>
      <div class="next-session" id="profileStatus" style="color:#8b93a1;"></div>
      <button type="submit" class="btn-primary btn-full">Save changes</button>
    </form>
  </div>
</div>

<div class="overlay hidden" id="calPickClientOverlay">
  <div>
    <div class="add-form">
      <div class="add-form-header">
        <h2>Schedule for…</h2>
        <button type="button" class="icon-btn" id="closeCalPickBtn" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="calPickTimeLabel" class="next-session" style="color:#8b93a1;"></div>
      <div id="calClientList" style="display:flex; flex-direction:column; gap:8px; max-height:320px; overflow-y:auto;"></div>
    </div>
  </div>
</div>

<div class="overlay hidden" id="infoModalOverlay">
  <div>
    <div class="add-form">
      <div class="add-form-header">
        <h2 id="infoModalTitle">Session booked</h2>
        <button type="button" class="icon-btn" id="closeInfoModalBtn" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p id="infoModalMessage" style="margin:0 0 4px; font-size:14px; color:#EDEBE4; line-height:1.5;"></p>
      <button type="button" class="btn-primary btn-full" id="infoModalOkBtn">OK</button>
    </div>
  </div>
</div>

<script src="client-scheduler.js"></script>

</body>
</html>
