<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · Session Book</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="panel">
  <div class="brand">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>
    </div>
    <h1>Session Book</h1>
  </div>
  <p class="subtitle">Sign in to manage your clients</p>

  <div id="providersView">
    <div class="auth-tabs">
      <button class="auth-tab-btn active" id="authTabSignin" type="button">Sign in</button>
      <button class="auth-tab-btn" id="authTabSignup" type="button">Create account</button>
    </div>

    <form id="signinForm">
      <label class="field">
        <span>Email address</span>
        <input type="email" id="signinEmail" placeholder="you@example.com" required />
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" id="signinPassword" placeholder="••••••••" required />
      </label>
      <button type="submit" class="btn-primary" id="signinBtn">Sign in</button>
    </form>
    <button class="btn-link" id="forgotPasswordLink" type="button">Forgot password?</button>

    <form id="signupForm" class="hidden">
      <label class="field">
        <span>Email address</span>
        <input type="email" id="signupEmail" placeholder="you@example.com" required />
      </label>
      <label class="field">
        <span>Mobile number</span>
        <input type="tel" id="signupPhone" placeholder="082 123 4567" required />
      </label>
      <label class="field">
        <span>Company name</span>
        <input type="text" id="signupCompanyName" placeholder="Your business name" required />
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" id="signupPassword" placeholder="At least 8 characters" minlength="8" required />
      </label>
      <p class="field-hint">At least 8 characters, with an uppercase letter, a lowercase letter, and a number.</p>
      <label class="field">
        <span>Confirm password</span>
        <input type="password" id="signupPasswordConfirm" placeholder="••••••••" minlength="8" required />
      </label>
      <button type="submit" class="btn-primary" id="signupBtn">Create account</button>
    </form>
  </div>

  <div id="forgotRequestView" class="hidden">
    <p class="subtitle" style="margin-bottom:18px;">Enter your account email and we'll send a reset code.</p>
    <form id="forgotRequestForm">
      <label class="field">
        <span>Email address</span>
        <input type="email" id="forgotEmail" placeholder="you@example.com" required />
      </label>
      <button type="submit" class="btn-primary" id="forgotRequestBtn">Send reset code</button>
    </form>
    <button class="btn-link" id="backToSigninFromForgot">Back to sign in</button>
  </div>

  <div id="forgotResetView" class="hidden">
    <p class="subtitle" id="resetCodeSentTo" style="margin-bottom:18px;"></p>
    <form id="forgotResetForm">
      <label class="field">
        <span>6-digit code</span>
        <input type="text" id="resetCodeInput" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="123456" required />
      </label>
      <label class="field">
        <span>New password</span>
        <input type="password" id="resetNewPassword" placeholder="At least 8 characters" minlength="8" required />
      </label>
      <p class="field-hint">At least 8 characters, with an uppercase letter, a lowercase letter, and a number.</p>
      <label class="field">
        <span>Confirm new password</span>
        <input type="password" id="resetNewPasswordConfirm" placeholder="••••••••" minlength="8" required />
      </label>
      <button type="submit" class="btn-primary" id="resetPasswordBtn">Reset password & sign in</button>
    </form>
    <button class="btn-link" id="backToSigninFromReset">Back to sign in</button>
  </div>

  <div id="codeView" class="hidden">
    <p class="subtitle" id="codeSentTo" style="margin-bottom:18px;"></p>
    <form id="codeVerifyForm">
      <label class="field">
        <span>6-digit code</span>
        <input type="text" id="codeInput" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="123456" required autofocus />
      </label>
      <button type="submit" class="btn-primary" id="verifyCodeBtn">Verify & sign in</button>
    </form>
    <button class="btn-link" id="backToProviders">Use a different sign-in method</button>
  </div>

  <div class="status" id="statusMsg"></div>
</div>

<script src="login.js"></script>
</body>
</html>
